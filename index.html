<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Studio · Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0f;
            color: #e6e6ef;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background-image: radial-gradient(circle at 15% 25%, rgba(0,255,200,0.06) 0%, transparent 45%),
                              radial-gradient(circle at 85% 70%, rgba(180,0,255,0.07) 0%, transparent 50%);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(0,255,255,0.10) 0%, transparent 55%),
                        radial-gradient(ellipse at 80% 30%, rgba(255,0,200,0.08) 0%, transparent 50%);
            filter: blur(60px);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background-image: radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.15), transparent),
                              radial-gradient(2px 2px at 30% 70%, rgba(255,255,255,0.10), transparent),
                              radial-gradient(3px 3px at 50% 10%, rgba(0,255,255,0.20), transparent);
            background-size: 200% 200%;
            animation: particleFloat 30s ease-in-out infinite alternate;
        }
        @keyframes particleFloat {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(16, 16, 26, 0.78);
            backdrop-filter: blur(12px) saturate(1.3);
            padding: 32px 34px;
            border-radius: 36px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.04);
            width: 100%;
            max-width: 1160px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 26px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #a0f0ff, #7a8cff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        h1 i { font-size: 26px; color: #7ae0ff; text-shadow: 0 0 25px rgba(0,200,255,0.3); }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 0.9fr;
            gap: 28px;
        }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
            color: #b0b8c9;
            font-size: 13px;
        }
        textarea {
            width: 100%;
            height: 110px;
            background: rgba(4,4,12,0.7);
            border: 1.5px solid #2a2a3e;
            border-radius: 18px;
            color: #f0f4ff;
            padding: 14px 18px;
            font-size: 14px;
            box-sizing: border-box;
            resize: vertical;
            backdrop-filter: blur(4px);
            transition: border 0.2s, box-shadow 0.2s;
            font-family: 'Segoe UI', monospace;
        }
        textarea:focus, input:focus, select:focus {
            border-color: #66d4ff !important;
            box-shadow: 0 0 0 4px rgba(0,200,255,0.12);
            outline: none;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 12px 0 10px 0;
            background: rgba(10,10,20,0.5);
            backdrop-filter: blur(4px);
            padding: 10px 12px;
            border-radius: 28px;
            border: 1px solid #26263a;
        }
        .toolbar button {
            background: rgba(36,40,58,0.7);
            backdrop-filter: blur(2px);
            color: #eef2ff;
            border: none;
            padding: 6px 13px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
        }
        .toolbar button:hover {
            background: #3d4466;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .btn-style { border-bottom: 3px solid #aabbdd; }
        .btn-anim { border-bottom: 3px solid #ff66ff; background: rgba(40,20,50,0.6); }
        .btn-player { border-bottom: 3px solid #ffdd44; }
        .btn-cd { border-bottom: 3px solid #ff4444; background: rgba(50,18,18,0.6); }
        .btn-icon { border-bottom: 3px solid #66ffaa; background: rgba(20,50,30,0.5); }

        .panel {
            background: rgba(10,10,20,0.5);
            backdrop-filter: blur(6px);
            padding: 18px 18px;
            border-radius: 26px;
            border: 1px solid #28283e;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 12px;
            align-items: center;
        }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 9px 14px;
            background: rgba(4,4,12,0.6);
            border: 1px solid #2b2b42;
            border-radius: 30px;
            color: #f0f4ff;
            box-sizing: border-box;
            backdrop-filter: blur(2px);
            transition: 0.15s;
            font-size: 14px;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #66d4ff;
            cursor: pointer;
        }
        .flex {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        input[type="color"] {
            border: none;
            width: 40px;
            height: 34px;
            cursor: pointer;
            background: transparent;
            padding: 0;
            border-radius: 30px;
        }
        hr {
            border: 0;
            border-top: 1px solid #282842;
            margin: 14px 0;
        }

        /* ---------- LIVE-VORSCHAU (komplette Notification) ---------- */
        .preview-wrapper {
            margin-top: 14px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid #2a2a3e;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .preview-notification {
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            font-size: 15px;
            line-height: 1.5;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .preview-notification .icon-img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: #222;
        }
        .preview-notification .content {
            flex: 1;
            min-width: 0;
        }
        .preview-notification .sender {
            font-weight: 700;
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 2px;
            display: block;
        }
        .preview-notification .message {
            word-wrap: break-word;
        }
        .preview-notification .message .inline-icon {
            width: 22px;
            height: 22px;
            vertical-align: middle;
            border-radius: 4px;
            margin: 0 2px;
        }

        /* Animationen für die Vorschau */
        .rainbow-text {
            background: linear-gradient(90deg, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbowMove 3s linear infinite;
        }
        @keyframes rainbowMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        .shake { display: inline-block; animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(-3px,2px) rotate(-2deg); }
            50% { transform: translate(3px,-2px) rotate(2deg); }
            75% { transform: translate(-2px,1px) rotate(-1deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }
        .jump { display: inline-block; animation: jump 0.6s ease-in-out infinite; }
        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .wave { display: inline-block; animation: wave 1.2s ease-in-out infinite; }
        @keyframes wave {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(3deg) scale(1.02); }
            75% { transform: rotate(-3deg) scale(0.98); }
        }
        .gradient-text {
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .preview-placeholder {
            color: #8a8aaa;
            font-style: italic;
            text-align: center;
            width: 100%;
        }

        /* ---------- TAG-LISTE (interaktiv) ---------- */
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 18px;
            border: 1px solid #2a2a3e;
            min-height: 36px;
            align-items: center;
        }
        .tag-item {
            background: rgba(40,60,90,0.6);
            padding: 4px 10px 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #4a6a8a;
            backdrop-filter: blur(2px);
        }
        .tag-item .tag-name {
            color: #c0d0e0;
        }
        .tag-item .tag-remove {
            cursor: pointer;
            color: #ff7777;
            font-size: 14px;
            line-height: 1;
            padding: 0 2px;
            border-radius: 50%;
            transition: 0.2s;
        }
        .tag-item .tag-remove:hover {
            background: rgba(255,0,0,0.3);
            color: #ff3333;
        }
        .tag-list-empty {
            color: #6a7a8a;
            font-style: italic;
            font-size: 13px;
        }

        /* ---------- CODE-AUSGABEN ---------- */
        .outputs { margin-top: 24px; }
        .code-box {
            background: rgba(2,2,10,0.7);
            backdrop-filter: blur(4px);
            border: 1px solid #202036;
            padding: 14px 20px;
            border-radius: 22px;
            transition: border 0.2s;
            margin-bottom: 14px;
        }
        .code-box:hover { border-color: #3a4a6a; }
        .code-box .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .code-box .head label {
            font-weight: 500;
            font-size: 13px;
            color: #bcc3d6;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .code-box .head label i { color: #6ab0ff; }
        .code-box pre {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            color: #b0f0d0;
            word-break: break-all;
            white-space: pre-wrap;
            margin: 0;
            font-size: 13px;
            line-height: 1.7;
            max-height: 250px;
            overflow-y: auto;
        }
        .copy-btn {
            background: #2a6a8a;
            color: #f0faff;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .copy-btn:hover { background: #3b8ab0; transform: scale(1.02); }

        @media (max-width: 600px) {
            .row { grid-template-columns: 1fr; }
            .container { padding: 16px; }
            .preview-notification { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-bolt"></i> Notification Studio · Pro <i class="fas fa-eye" style="font-size:22px; opacity:0.6;"></i></h1>

    <div class="grid">
        <!-- Linke Spalte: Text + Toolbar + Tag-Liste + Vorschau -->
        <div>
            <label for="textInput"><i class="fas fa-pen-fancy" style="margin-right:6px;"></i> Nachricht (Tags möglich)</label>
            <textarea id="textInput">Hallo &displayname&! Das ist ein &rainbow:&jump:Design-Test&&&&! &icon:10845341253&</textarea>

            <div class="toolbar">
                <button class="btn-anim" onclick="wrapText('jump')"><i class="fas fa-arrow-up"></i> Jump</button>
                <button class="btn-anim" onclick="wrapText('shake')"><i class="fas fa-bolt"></i> Shake</button>
                <button class="btn-anim" onclick="wrapText('rainbow')"><i class="fas fa-rainbow"></i> Regenb.</button>
                <button class="btn-anim" onclick="wrapText('wave')"><i class="fas fa-water"></i> Welle</button>
                <button class="btn-style" onclick="wrapText('bold')"><i class="fas fa-bold"></i> Fett</button>
                <button class="btn-style" onclick="wrapText('italic')"><i class="fas fa-italic"></i> Kursiv</button>
                <button class="btn-style" onclick="wrapText('underline')"><i class="fas fa-underline"></i> Unterstr.</button>
                <button class="btn-icon" onclick="insertColorTag()"><i class="fas fa-palette"></i> Farbe</button>
                <button class="btn-icon" onclick="insertGradientTag()"><i class="fas fa-fill-drip"></i> Verlauf</button>
                <button class="btn-icon" onclick="addIcon()"><i class="fas fa-image"></i> Icon</button>
                <button class="btn-player" onclick="insertVar('&displayname&')"><i class="fas fa-user-tag"></i> Disp.</button>
                <button class="btn-cd" onclick="insertVar('&countdown&')"><i class="fas fa-hourglass-half"></i> Countdown</button>
            </div>

            <!-- Tag-Liste (interaktiv) -->
            <div class="tag-list" id="tagList">
                <span class="tag-list-empty">Keine Tags erkannt</span>
            </div>

            <!-- Live-Vorschau (komplette Notification) -->
            <div class="preview-wrapper">
                <div id="previewNotification" class="preview-notification">
                    <span class="preview-placeholder">⬅️ Einstellungen und Text eingeben</span>
                </div>
            </div>
            <div style="font-size:12px; color:#6a7a8a; margin-top:6px; text-align:center;">
                <i class="fas fa-magic"></i> Diese Vorschau zeigt, wie die Notification später aussieht.
            </div>
        </div>

        <!-- Rechte Spalte: Einstellungen mit Zielauswahl -->
        <div class="panel">
            <!-- Ziel (target) – neu -->
            <div class="row">
                <div>
                    <label style="color:#00ffff;"><i class="fas fa-globe"></i> Ziel (target)</label>
                    <select id="targetSelect" onchange="togglePlayersField(); updateAll();">
                        <option value="All">Alle (global)</option>
                        <option value="Server">Nur dieser Server</option>
                        <option value="Specific">Bestimmte Spieler</option>
                    </select>
                </div>
                <div id="playersFieldWrapper">
                    <label id="playersLabel" style="opacity:0.5;">Spieler (Namen/IDs)</label>
                    <input type="text" id="playersInput" placeholder='z.B. "Gamer123", 12345' disabled style="opacity:0.5;" oninput="updateAll()">
                </div>
            </div>

            <div class="row">
                <div>
                    <label><i class="fas fa-user-astronaut"></i> Sender</label>
                    <input type="text" id="senderInput" value="System-Admin" oninput="updateAll()">
                </div>
                <div>
                    <label><i class="fas fa-arrows-alt-v"></i> Position</label>
                    <select id="posInput" onchange="updateAll()">
                        <option value="Top">Oben</option>
                        <option value="Bottom" selected>Unten</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div>
                    <label><i class="far fa-clock"></i> Dauer (Sek.)</label>
                    <input type="number" id="durationInput" value="8" min="1" oninput="updateAll()">
                </div>
                <div>
                    <label><i class="fas fa-image"></i> Image ID (optional)</label>
                    <input type="text" id="imageIdInput" value="10845341253" placeholder="z.B. 10845341253" oninput="updateAll()">
                </div>
            </div>

            <div class="row">
                <div class="flex">
                    <input type="checkbox" id="anonInput" onchange="updateAll()">
                    <label style="margin:0; cursor:pointer;"><i class="fas fa-user-secret"></i> Anonym</label>
                </div>
                <div class="flex">
                    <input type="checkbox" id="countdownInput" onchange="updateAll()">
                    <label style="margin:0; cursor:pointer; color:#ff7777;"><i class="fas fa-clock"></i> Countdown</label>
                </div>
            </div>

            <hr>

            <div class="row">
                <div class="flex">
                    <input type="color" id="bgColorInput" value="#111116" onchange="updateAll()">
                    <label style="margin:0;">Hintergrund</label>
                </div>
                <div>
                    <label><i class="fas fa-ghost"></i> Transparenz</label>
                    <input type="number" id="transparencyInput" value="0.25" min="0" max="1" step="0.05" oninput="updateAll()">
                </div>
            </div>

            <div class="row">
                <div class="flex">
                    <input type="checkbox" id="strokeEnabled" checked onchange="updateAll()">
                    <label style="margin:0; cursor:pointer;"><i class="fas fa-border-all"></i> Box-Rahmen</label>
                </div>
                <div class="flex">
                    <input type="color" id="strokeColor" value="#00ffcc" onchange="updateAll()">
                    <input type="number" id="strokeThick" value="2" min="1" max="5" style="width:55px;" oninput="updateAll()">
                </div>
            </div>

            <div class="row">
                <div class="flex">
                    <input type="checkbox" id="textStrokeEnabled" checked onchange="updateAll()">
                    <label style="margin:0; cursor:pointer;"><i class="fas fa-font"></i> Text-Outline</label>
                </div>
                <div class="flex">
                    <input type="color" id="textStrokeColor" value="#000000" onchange="updateAll()">
                    <input type="number" id="textStrokeThick" value="2" min="1" max="5" style="width:55px;" oninput="updateAll()">
                </div>
            </div>
        </div>
    </div>

    <!-- Code-Ausgaben -->
    <div class="outputs">
        <div class="code-box">
            <div class="head">
                <label><i class="fas fa-code"></i> Lua · Server-Skript (MessagingService)</label>
                <button class="copy-btn" onclick="copyCode('luaOutput')"><i class="fas fa-copy"></i> Kopieren</button>
            </div>
            <pre id="luaOutput">-- Generiere den Code durch Eingabe.</pre>
        </div>
        <div class="code-box">
            <div class="head">
                <label><i class="fas fa-terminal"></i> Console · F9 Befehl</label>
                <button class="copy-btn" onclick="copyCode('consoleOutput')"><i class="fas fa-copy"></i> Kopieren</button>
            </div>
            <pre id="consoleOutput"></pre>
        </div>
        <div class="code-box">
            <div class="head">
                <label><i class="fas fa-cloud"></i> JSON · Webhook / API</label>
                <button class="copy-btn" onclick="copyCode('jsonOutput')"><i class="fas fa-copy"></i> Kopieren</button>
            </div>
            <pre id="jsonOutput"></pre>
        </div>
    </div>
</div>

<script>
    // ===== PARSER FÜR TAGS (rekursiv) =====
    function parseTags(text) {
        let placeholders = {
            '&displayname&': '<span style="color:#ffaa00; font-weight:bold;">[Displayname]</span>',
            '&playername&': '<span style="color:#ffaa00; font-weight:bold;">[Username]</span>',
            '&countdown&': '<span style="color:#ff6666; font-weight:bold;">[Countdown]</span>'
        };
        for (let [key, val] of Object.entries(placeholders)) {
            text = text.replaceAll(key, val);
        }
        let previous;
        do {
            previous = text;
            text = text.replace(/&(\w+):([^&]*)&/g, function(match, tag, content) {
                return applyTag(tag, content);
            });
        } while (text !== previous);
        return text;
    }

    function applyTag(tag, content) {
        switch(tag) {
            case 'bold': return `<strong>${content}</strong>`;
            case 'italic': return `<em>${content}</em>`;
            case 'underline': return `<u>${content}</u>`;
            case 'strikethrough': return `<del>${content}</del>`;
            case 'color': {
                let parts = content.split(':');
                if (parts.length >= 1) {
                    let color = parts[0];
                    let text = parts.slice(1).join(':');
                    return `<span style="color:#${color};">${text}</span>`;
                }
                return content;
            }
            case 'gradient': {
                let parts = content.split(':');
                if (parts.length >= 2) {
                    let c1 = parts[0], c2 = parts[1];
                    let text = parts.slice(2).join(':');
                    return `<span class="gradient-text" style="background:linear-gradient(90deg,#${c1},#${c2});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">${text}</span>`;
                }
                return content;
            }
            case 'rainbow': return `<span class="rainbow-text">${content}</span>`;
            case 'shake': return `<span class="shake">${content}</span>`;
            case 'jump': return `<span class="jump">${content}</span>`;
            case 'wave': return `<span class="wave">${content}</span>`;
            case 'icon': {
                return `<img src="https://www.roblox.com/asset/?id=${content}" class="inline-icon" alt="icon">`;
            }
            default: return content;
        }
    }

    // ===== TAG-LISTE EXTRAHIEREN =====
    function extractTags(text) {
        let tags = [];
        let regex = /&(\w+):([^&]*)&/g;
        let match;
        while ((match = regex.exec(text)) !== null) {
            let fullTag = match[0];
            let tagType = match[1];
            let tagContent = match[2];
            tags.push({ full: fullTag, type: tagType, content: tagContent });
        }
        return tags;
    }

    function renderTagList(text) {
        const container = document.getElementById('tagList');
        const tags = extractTags(text);
        if (tags.length === 0) {
            container.innerHTML = '<span class="tag-list-empty">Keine Tags erkannt</span>';
            return;
        }
        let html = '';
        tags.forEach((tag, index) => {
            let display = tag.full;
            if (tag.type === 'icon') display = `🖼️ ${tag.content}`;
            else if (tag.type === 'color') display = `🎨 #${tag.content}`;
            else if (tag.type === 'gradient') display = `🌈 Verlauf`;
            else display = `${tag.type}:${tag.content}`;
            html += `<div class="tag-item">
                        <span class="tag-name">${display}</span>
                        <span class="tag-remove" data-index="${index}" onclick="removeTag(${index})"><i class="fas fa-times"></i></span>
                    </div>`;
        });
        container.innerHTML = html;
    }

    function removeTag(index) {
        const textarea = document.getElementById('textInput');
        let text = textarea.value;
        const tags = extractTags(text);
        if (index < tags.length) {
            let found = 0;
            let newText = text.replace(/&(\w+):([^&]*)&/g, function(match) {
                if (found === index) {
                    found++;
                    return '';
                }
                found++;
                return match;
            });
            textarea.value = newText;
            updateAll();
        }
    }

    // ===== VORSCHAU (komplette Notification) =====
    function updatePreview() {
        const raw = document.getElementById('textInput').value;
        const sender = document.getElementById('senderInput').value || 'System';
        const isAnon = document.getElementById('anonInput').checked;
        const imageId = document.getElementById('imageIdInput').value.trim();
        const bgColor = document.getElementById('bgColorInput').value;
        const trans = parseFloat(document.getElementById('transparencyInput').value) || 0.25;
        const strokeEnabled = document.getElementById('strokeEnabled').checked;
        const strokeColor = document.getElementById('strokeColor').value;
        const strokeThick = parseInt(document.getElementById('strokeThick').value) || 2;
        const textStrokeEnabled = document.getElementById('textStrokeEnabled').checked;
        const textStrokeColor = document.getElementById('textStrokeColor').value;
        const textStrokeThick = parseInt(document.getElementById('textStrokeThick').value) || 2;
        const isCountdown = document.getElementById('countdownInput').checked;
        const duration = parseInt(document.getElementById('durationInput').value) || 8;

        const preview = document.getElementById('previewNotification');

        if (!raw.trim()) {
            preview.innerHTML = `<span class="preview-placeholder">⬅️ Gib eine Nachricht ein</span>`;
            preview.style.cssText = '';
            return;
        }

        let parsedText = parseTags(raw);
        if (isCountdown) {
            parsedText = parsedText.replace(/\[Countdown\]/g, `<span style="color:#ff6666; font-weight:bold;">${duration}s</span>`);
        }

        let senderHtml = '';
        if (!isAnon && sender) {
            senderHtml = `<span class="sender">${sender}</span>`;
        }

        let iconHtml = '';
        if (imageId) {
            iconHtml = `<img src="https://www.roblox.com/asset/?id=${imageId}" class="icon-img" alt="icon">`;
        }

        const contentHtml = `
            ${iconHtml}
            <div class="content">
                ${senderHtml}
                <div class="message">${parsedText}</div>
            </div>
        `;

        let bgRgba = hexToRgba(bgColor, trans);
        let styles = `
            background: ${bgRgba};
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(4px);
            font-size: 15px;
            line-height: 1.5;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            color: #f0f4ff;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        `;

        if (strokeEnabled) {
            styles += `border: ${strokeThick}px solid ${strokeColor};`;
        } else {
            styles += `border: none;`;
        }

        let styleTag = document.getElementById('previewMessageStyle');
        if (!styleTag) {
            styleTag = document.createElement('style');
            styleTag.id = 'previewMessageStyle';
            document.head.appendChild(styleTag);
        }
        if (textStrokeEnabled) {
            let shadows = [];
            for (let i = 0; i < textStrokeThick; i++) {
                let off = i + 1;
                shadows.push(`${off}px ${off}px 0 ${textStrokeColor}`);
                shadows.push(`-${off}px ${off}px 0 ${textStrokeColor}`);
                shadows.push(`${off}px -${off}px 0 ${textStrokeColor}`);
                shadows.push(`-${off}px -${off}px 0 ${textStrokeColor}`);
            }
            styleTag.textContent = `
                #previewNotification .message {
                    text-shadow: ${shadows.join(', ')};
                }
            `;
        } else {
            styleTag.textContent = '';
        }

        preview.innerHTML = contentHtml;
        preview.style.cssText = styles;
    }

    function hexToRgba(hex, alpha) {
        let r = parseInt(hex.slice(1,3), 16);
        let g = parseInt(hex.slice(3,5), 16);
        let b = parseInt(hex.slice(5,7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    // ===== TEXT-BEARBEITUNG =====
    function wrapText(tagType) {
        const textarea = document.getElementById('textInput');
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const text = textarea.value;
        if (start === end) {
            alert("Bitte markiere zuerst einen Textabschnitt!");
            return;
        }
        const selected = text.substring(start, end);
        const replacement = `&${tagType}:${selected}&`;
        textarea.value = text.substring(0, start) + replacement + text.substring(end);
        textarea.focus();
        updateAll();
    }

    function insertColorTag() {
        const hex = prompt("Gib eine Hex-Farbe ein (z.B. FF0000):", "FF5555");
        if (!hex) return;
        const textarea = document.getElementById('textInput');
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const text = textarea.value;
        if (start === end) {
            alert("Bitte markiere zuerst den Text, der gefärbt werden soll!");
            return;
        }
        const selected = text.substring(start, end);
        const replacement = `&color:${hex.replace('#','')}:${selected}&`;
        textarea.value = text.substring(0, start) + replacement + text.substring(end);
        textarea.focus();
        updateAll();
    }

    function insertGradientTag() {
        const c1 = prompt("Startfarbe (Hex):", "FF0000");
        if (!c1) return;
        const c2 = prompt("Endfarbe (Hex):", "00FF00");
        if (!c2) return;
        const textarea = document.getElementById('textInput');
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const text = textarea.value;
        if (start === end) {
            alert("Bitte markiere zuerst den Text!");
            return;
        }
        const selected = text.substring(start, end);
        const replacement = `&gradient:${c1.replace('#','')}:${c2.replace('#','')}:${selected}&`;
        textarea.value = text.substring(0, start) + replacement + text.substring(end);
        textarea.focus();
        updateAll();
    }

    function addIcon() {
        const id = prompt("Gib die Roblox Asset-ID ein:", "10845341253");
        if (!id) return;
        const textarea = document.getElementById('textInput');
        const start = textarea.selectionStart;
        const text = textarea.value;
        textarea.value = text.substring(0, start) + `&icon:${id}&` + text.substring(start);
        textarea.focus();
        updateAll();
    }

    function insertVar(v) {
        const textarea = document.getElementById('textInput');
        const start = textarea.selectionStart;
        const text = textarea.value;
        textarea.value = text.substring(0, start) + v + text.substring(start);
        textarea.focus();
        updateAll();
    }

    // ===== ZIEL-AUSWAHL (target) =====
    function togglePlayersField() {
        const sel = document.getElementById('targetSelect');
        const wrapper = document.getElementById('playersFieldWrapper');
        const input = document.getElementById('playersInput');
        const label = document.getElementById('playersLabel');
        if (sel.value === 'Specific') {
            input.disabled = false;
            input.style.opacity = '1';
            label.style.opacity = '1';
        } else {
            input.disabled = true;
            input.style.opacity = '0.5';
            label.style.opacity = '0.5';
        }
    }

    // ===== CODE-GENERIERUNG (neues System mit target) =====
    function generateCode() {
        const raw = document.getElementById('textInput').value;
        const luaText = raw.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
        const jsonText = raw.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n');

        const sender = document.getElementById('senderInput').value.replace(/"/g, '\\"');
        const pos = document.getElementById('posInput').value;
        const duration = parseInt(document.getElementById('durationInput').value) || 8;
        const imageId = document.getElementById('imageIdInput').value.trim();
        const bgColor = document.getElementById('bgColorInput').value.replace('#', '').toUpperCase();
        const transparency = parseFloat(document.getElementById('transparencyInput').value) || 0.25;
        const anon = document.getElementById('anonInput').checked;
        const isCountdown = document.getElementById('countdownInput').checked;
        const strokeEnabled = document.getElementById('strokeEnabled').checked;
        const strokeColor = document.getElementById('strokeColor').value.replace('#', '').toUpperCase();
        const strokeThick = parseInt(document.getElementById('strokeThick').value) || 2;
        const textStrokeEnabled = document.getElementById('textStrokeEnabled').checked;
        const textStrokeColor = document.getElementById('textStrokeColor').value.replace('#', '').toUpperCase();
        const textStrokeThick = parseInt(document.getElementById('textStrokeThick').value) || 2;

        // Target
        const targetType = document.getElementById('targetSelect').value;
        let targetLua = '"All"';
        if (targetType === 'Server') targetLua = '"Server"';
        else if (targetType === 'Specific') {
            const players = document.getElementById('playersInput').value.trim();
            targetLua = players ? '{' + players + '}' : '"All"';
        }

        // ----- LUA (mit target) -----
        let luaLines = [];
        luaLines.push('-- NotificationSystem (Server)');
        luaLines.push('local NotificationSystem = require(game:GetService("ServerScriptService"):WaitForChild("NotificationSystem"))');
        luaLines.push('');
        luaLines.push('local config = {');
        luaLines.push(`    target = ${targetLua},`);
        luaLines.push(`    sender = "${sender}",`);
        luaLines.push(`    text = "${luaText}",`);
        if (duration !== 8) luaLines.push(`    duration = ${duration},`);
        if (pos !== 'Bottom') luaLines.push(`    screenPosition = "${pos}",`);
        luaLines.push(`    anonymous = ${anon},`);
        luaLines.push(`    isCountdown = ${isCountdown},`);
        if (isCountdown) luaLines.push(`    targetTimestamp = os.time() + ${duration},`);
        if (bgColor !== '111116') luaLines.push(`    backgroundColorHex = "${bgColor}",`);
        if (transparency !== 0.25) luaLines.push(`    backgroundTransparency = ${transparency},`);
        if (strokeEnabled) {
            luaLines.push(`    strokeEnabled = true,`);
            if (strokeColor !== '00FFCC') luaLines.push(`    strokeColorHex = "${strokeColor}",`);
            if (strokeThick !== 2) luaLines.push(`    strokeThickness = ${strokeThick},`);
        } else {
            luaLines.push(`    strokeEnabled = false,`);
        }
        if (textStrokeEnabled) {
            luaLines.push(`    textStrokeEnabled = true,`);
            if (textStrokeColor !== '000000') luaLines.push(`    textStrokeColorHex = "${textStrokeColor}",`);
            if (textStrokeThick !== 2) luaLines.push(`    textStrokeThickness = ${textStrokeThick},`);
        } else {
            luaLines.push(`    textStrokeEnabled = false,`);
        }
        if (imageId) luaLines.push(`    imageId = "${imageId}",`);
        // letztes Komma entfernen
        let last = luaLines[luaLines.length-1];
        if (last.endsWith(',')) luaLines[luaLines.length-1] = last.slice(0, -1);
        luaLines.push('}');
        luaLines.push('');
        luaLines.push('-- Senden (global oder lokal)');
        luaLines.push('NotificationSystem.send(config)');
        luaLines.push('print("✅ Notification gesendet!")');

        const luaCode = luaLines.join('\n');

        // ----- CONSOLE (kompakt) -----
        let consoleParts = [];
        consoleParts.push(`local NotificationSystem = require(game:GetService("ServerScriptService"):WaitForChild("NotificationSystem"))`);
        consoleParts.push(`NotificationSystem.send({`);
        consoleParts.push(`    target = ${targetLua},`);
        consoleParts.push(`    sender = "${sender}",`);
        consoleParts.push(`    text = "${luaText}",`);
        if (duration !== 8) consoleParts.push(`    duration = ${duration},`);
        if (pos !== 'Bottom') consoleParts.push(`    screenPosition = "${pos}",`);
        consoleParts.push(`    anonymous = ${anon},`);
        consoleParts.push(`    isCountdown = ${isCountdown},`);
        if (isCountdown) consoleParts.push(`    targetTimestamp = os.time() + ${duration},`);
        if (bgColor !== '111116') consoleParts.push(`    backgroundColorHex = "${bgColor}",`);
        if (transparency !== 0.25) consoleParts.push(`    backgroundTransparency = ${transparency},`);
        consoleParts.push(`    strokeEnabled = ${strokeEnabled},`);
        if (strokeColor !== '00FFCC') consoleParts.push(`    strokeColorHex = "${strokeColor}",`);
        if (strokeThick !== 2) consoleParts.push(`    strokeThickness = ${strokeThick},`);
        consoleParts.push(`    textStrokeEnabled = ${textStrokeEnabled},`);
        if (textStrokeColor !== '000000') consoleParts.push(`    textStrokeColorHex = "${textStrokeColor}",`);
        if (textStrokeThick !== 2) consoleParts.push(`    textStrokeThickness = ${textStrokeThick},`);
        if (imageId) consoleParts.push(`    imageId = "${imageId}",`);
        let lastConsole = consoleParts[consoleParts.length-1];
        if (lastConsole.endsWith(',')) consoleParts[consoleParts.length-1] = lastConsole.slice(0, -1);
        consoleParts.push('})');
        const consoleCode = consoleParts.join('\n');

        // ----- JSON (kompakt) -----
        let jsonObj = {
            target: targetType === 'All' ? 'All' : (targetType === 'Server' ? 'Server' : 'Specific'),
            sender: document.getElementById('senderInput').value,
            text: raw,
            anonymous: anon,
            isCountdown: isCountdown,
            screenPosition: pos,
            backgroundColorHex: bgColor,
            backgroundTransparency: transparency,
            strokeEnabled: strokeEnabled,
            strokeColorHex: strokeColor,
            strokeThickness: strokeThick,
            textStrokeEnabled: textStrokeEnabled,
            textStrokeColorHex: textStrokeColor,
            textStrokeThickness: textStrokeThick
        };
        if (duration !== 8) jsonObj.duration = duration;
        if (isCountdown) jsonObj.targetTimestamp = `os.time() + ${duration}`;
        if (imageId) jsonObj.imageId = imageId;
        if (targetType === 'Specific') {
            const players = document.getElementById('playersInput').value.trim();
            if (players) jsonObj.players = players.split(',').map(s => s.trim());
        }
        // remove undefined
        Object.keys(jsonObj).forEach(k => {
            if (jsonObj[k] === undefined) delete jsonObj[k];
        });
        const jsonCode = JSON.stringify(jsonObj, null, 2);

        document.getElementById('luaOutput').textContent = luaCode;
        document.getElementById('consoleOutput').textContent = consoleCode;
        document.getElementById('jsonOutput').textContent = jsonCode;
    }

    // ===== KOMBINIERTE AKTUALISIERUNG =====
    function updateAll() {
        const text = document.getElementById('textInput').value;
        renderTagList(text);
        updatePreview();
        generateCode();
    }

    // ===== COPY =====
    function copyCode(id) {
        const pre = document.getElementById(id);
        const text = pre.textContent;
        if (!text) return;
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try {
            document.execCommand('copy');
            const btn = event.target.closest('button');
            const old = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Kopiert!';
            btn.style.backgroundColor = '#3aaa7a';
            setTimeout(() => { btn.innerHTML = old; btn.style.backgroundColor = ''; }, 1200);
        } catch (err) {
            alert('Fehler beim Kopieren.');
        }
        document.body.removeChild(ta);
    }

    // ===== EVENT-LISTENER =====
    document.getElementById('textInput').addEventListener('input', updateAll);

    document.querySelectorAll('#senderInput, #posInput, #durationInput, #imageIdInput, #bgColorInput, #transparencyInput, #anonInput, #countdownInput, #strokeEnabled, #strokeColor, #strokeThick, #textStrokeEnabled, #textStrokeColor, #textStrokeThick, #targetSelect, #playersInput').forEach(el => {
        el.addEventListener('input', updateAll);
        el.addEventListener('change', updateAll);
    });

    // Initiale Generierung
    togglePlayersField();
    updateAll();
</script>
</body>
